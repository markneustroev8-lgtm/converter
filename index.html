<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Универсальный Smart Конвертер & Курсы Валют</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --panel-bg: #1e293b;
            --text-color: #f8fafc;
            --accent-color: #38bdf8;
            --border-color: #334155;
            --result-bg: #0284c7;
            --input-bg: #0f172a;
        }

        [data-theme="light"] {
            --bg-color: #f1f5f9;
            --panel-bg: #ffffff;
            --text-color: #0f172a;
            --accent-color: #0284c7;
            --border-color: #cbd5e1;
            --result-bg: #22c55e;
            --input-bg: #f8fafc;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            align-items: center;
            justify-content: center;
            transition: background-color 0.3s, color 0.3s;
        }

        .container {
            width: 100%;
            max-width: 480px;
            background: var(--panel-bg);
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border-color);
            box-sizing: border-box;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        h1 {
            color: var(--accent-color);
            font-size: 22px;
            margin: 0;
            letter-spacing: 0.5px;
        }

        .header-btn {
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
        }

        label {
            font-weight: 600;
            display: block;
            margin-bottom: 6px;
            color: #94a3b8;
            font-size: 12px;
            text-transform: uppercase;
        }

        select, input {
            width: 100%;
            padding: 12px;
            margin-bottom: 16px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 16px;
            background-color: var(--input-bg);
            color: var(--text-color);
            outline: none;
        }

        .result-box {
            background: var(--result-bg);
            padding: 16px;
            border-radius: 8px;
            font-size: 22px;
            font-weight: bold;
            text-align: center;
            color: #ffffff;
            margin-top: 10px;
            word-break: break-all;
        }

        .ad-block {
            background: rgba(0,0,0,0.05);
            border: 1px dashed var(--accent-color);
            padding: 15px;
            text-align: center;
            margin: 15px 0;
            border-radius: 8px;
            color: #64748b;
            font-size: 12px;
        }

        .share-btn {
            width: 100%;
            background: #6366f1;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 15px;
            cursor: pointer;
            margin-top: 10px;
        }
        .share-btn:hover { background: #4f46e5; }

        footer {
            text-align: center;
            padding: 15px;
            color: #64748b;
            font-size: 12px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="top-bar">
        <h1>📐 Smart Сonverter Pro</h1>
        <button class="header-btn" onclick="toggleTheme()" id="themeBtn">☀️ Светлая тема</button>
    </div>
    
    <!-- ВЕРХНИЙ РЕКЛАМНЫЙ БЛОК -->
    <div class="ad-block">
  <script src="https://yandex.ru/ads/system/context.js" async></script>
<script data-page-id="19369143" src="https://yandex.ru/ads/system/ap-loader.js" async></script>
    </div>
    
    <label>Категория величин</label>
    <select id="category" onchange="updateUnits()">
        <option value="currency">💰 ВАЛЮТА (Живой курс через API)</option>
        <option value="length">📏 Длина (Метры, См, Дюймы)</option>
        <option value="weight">⚖️ Вес (Килограммы, Граммы, Фунты)</option>
        <option value="kitchen">🍳 Кулинария (Стаканы, Ложки, Мл)</option>
    </select>

    <label>Введите значение</label>
    <input type="number" id="inputValue" value="1" oninput="convert()">

    <label>Из каких единиц</label>
    <select id="fromUnit" onchange="convert()"></select>

    <label>В какие единицы</label>
    <select id="toUnit" onchange="convert()"></select>

    <div class="result-box">
        <span id="outputResult">1</span>
    </div>

    <button class="share-btn" onclick="shareSite()">🔗 Поделиться сервисом</button>

    <!-- НИЖНИЙ РЕКЛАМНЫЙ БЛОК -->
    <div class="ad-block">
  <script src="https://yandex.ru/ads/system/context.js" async></script>
<script data-page-id="19369143" src="https://yandex.ru/ads/system/ap-loader.js" async></script>
    </div>
</div>

<footer>
    &copy; 2026 SmartConverter Web App. Курсы обновляются в реальном времени.
</footer>

<script>
    // Статичные единицы измерения
    const staticUnits = {
        length: { meters: 1, cm: 0.01, inches: 0.0254, feet: 0.3048 },
        weight: { kg: 1, grams: 0.001, pounds: 0.453592, ounces: 0.0283495 },
        kitchen: { ml: 1, cups: 250, tbsp: 15, tsp: 5 }
    };

    const staticNames = {
        length: { meters: "Метры (м)", cm: "Сантиметры (см)", inches: "Дюймы (in)", feet: "Футы (ft)" },
        weight: { kg: "Килограммы (кг)", grams: "Граммы (г)", pounds: "Фунты (lbs)", ounces: "Унции (oz)" },
        kitchen: { ml: "Миллилитры (мл)", cups: "Стаканы (250 мл)", tbsp: "Столовые ложки", tsp: "Чайные ложки" }
    };

    // Динамические валюты (базовая единица — USD)
    let currencyRates = { rub: 92.5, usd: 1, eur: 0.92, cny: 7.23 }; 
    const currencyNames = { rub: "Российский рубль (RUB)", usd: "Доллар США (USD)", eur: "Евро (EUR)", cny: "Китайский юань (CNY)" };

    // Функция загрузки актуальных курсов валют из открытого API
    async function loadLiveCurrency() {
        try {
            const response = await fetch('https://er-api.com');
            if (response.ok) {
                const data = await response.json();
                currencyRates.rub = data.rates.RUB;
                currencyRates.eur = data.rates.EUR;
                currencyRates.cny = data.rates.CNY;
                console.log("Курсы валют успешно обновлены!");
            }
        } catch (e) {
            console.log("Не удалось загрузить живые курсы, используем резервные данные.");
        }
        updateUnits();
    }

    function updateUnits() {
        const cat = document.getElementById('category').value;
        const fromSel = document.getElementById('fromUnit');
        const toSel = document.getElementById('toUnit');
        
        fromSel.innerHTML = '';
        toSel.innerHTML = '';

        let activeUnits = cat === 'currency' ? currencyRates : staticUnits[cat];
        let activeNames = cat === 'currency' ? currencyNames : staticNames[cat];

        for (let key in activeUnits) {
            fromSel.options[fromSel.options.length] = new Option(activeNames[key], key);
            toSel.options[toSel.options.length] = new Option(activeNames[key], key);
        }
        
        // Для удобства выставим по умолчанию разные значения
        if(cat === 'currency' && fromSel.options[1]) toSel.selectedIndex = 1;

        convert();
    }

    function convert() {
        const cat = document.getElementById('category').value;
        const val = parseFloat(document.getElementById('inputValue').value);
        const from = document.getElementById('fromUnit').value;
        const to = document.getElementById('toUnit').value;

        if (isNaN(val)) {
            document.getElementById('outputResult').innerText = "0";
            return;
        }

        let finalValue = 0;

        if (cat === 'currency') {
            // Для валют: переводим из исходной валюты в доллары, а потом в целевую
            let valInUSD = val / currencyRates[from];
            finalValue = valInUSD * currencyRates[to];
        } else {
            // Для обычных физических величин
            let valueInBase = val * staticUnits[cat][from];
            finalValue = valueInBase / staticUnits[cat][to];
        }

        document.getElementById('outputResult').innerText = finalValue.toFixed(2).replace(/\.?0+$/, "");
    }

    // Логика переключения темы (День/Ночь)
    function toggleTheme() {
        const body = document.body;
        const btn = document.getElementById('themeBtn');
        if (body.getAttribute('data-theme') === 'light') {
            body.removeAttribute('data-theme');
            btn.innerText = "☀️ Светлая тема";
        } else {
            body.setAttribute('data-theme', 'light');
            btn.innerText = "🌙 Тёмная тема";
        }
    }

    // Кнопка шаринга
    function shareSite() {
        if (navigator.share) {
            navigator.share({
                title: 'Smart Конвертер Валют и Величин',
                url: window.location.href
            }).catch(console.error);
        } else {
            navigator.clipboard.writeText(window.location.href);
            alert("Ссылка на сайт скопирована в буфер обмена! Отправьте её друзьям.");
        }
    }

    // Запуск при открытии страницы
    loadLiveCurrency();
</script>

</body>
</html>
